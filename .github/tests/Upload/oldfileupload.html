<!DOCTYPE html>
<html>
<head>
    <title>File Upload Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
        }

        .container {
            width: 400px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }

        button {
            margin-top: 10px;
            padding: 8px 15px;
            cursor: pointer;
        }

        #fileName {
            margin-top: 10px;
            color: green;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Upload a File</h2>

    <form id="uploadForm">
        <input type="file" id="fileInput" />
        <br>
        <button type="submit">Upload</button>
    </form>

    <div id="fileName"></div>
</div>

<script>
document.getElementById("uploadForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const fileInput = document.getElementById("fileInput");

    if (fileInput.files.length > 0) {
        document.getElementById("fileName").innerHTML =
            "Uploaded File: <b>" + fileInput.files[0].name + "</b>";
    } else {
        alert("Please select a file.");
    }
});
</script>

</body>
</html>
